<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vfs-demo UI</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #f6f7fb;
        color: #111827;
      }
      .wrap {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      form {
        display: grid;
        gap: 8px;
      }
      input, textarea, button, select {
        font: inherit;
      }
      input, textarea, select {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
      }
      textarea {
        min-height: 90px;
        resize: vertical;
      }
      button {
        background: #111827;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }
      button:hover { opacity: 0.95; }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        overflow: auto;
        max-height: 360px;
        margin: 0;
      }
      .status {
        margin-bottom: 10px;
        font-size: 14px;
        color: #374151;
      }
      .full {
        grid-column: 1 / -1;
      }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
