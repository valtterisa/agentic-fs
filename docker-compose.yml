services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - backend

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command: ["bun", "scripts/index-demo-docs.ts"]
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: vfs_demo_docs
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - backend

  vfs-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.local
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      indexer:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: vfs_demo_docs
      SQLITE_PATH: /data/vfs-demo.db
      DEFAULT_ROLE: admin
      ENABLE_VECTOR_SEARCH: "false"
    volumes:
      - app_data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 8
    networks:
      - backend

volumes:
  qdrant_data:
  redis_data:
  app_data:

networks:
  backend:
    driver: bridge

